
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pet Island - Pet Raising Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-green: #B8D8B0;
  --bg-green-dark: #9BC494;
  --cream: #FFF8E7;
  --cream-dark: #F5EDDA;
  --wood: #D4C5A9;
  --wood-dark: #B8A88A;
  --leaf: #7BB661;
  --leaf-dark: #5E9A46;
  --gold: #F5C542;
  --gold-dark: #D4A520;
  --brown: #5C4033;
  --brown-light: #8B7355;
  --sky: #89CFF0;
  --pink: #F4A6B8;
  --red: #E07060;
  --orange: #F0A050;
  --blue: #60A0D0;
  --shadow: rgba(92, 64, 51, 0.12);
  --shadow-md: rgba(92, 64, 51, 0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-green);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 0%, transparent 40%);
  min-height: 100vh;
  color: var(--brown);
  overflow-x: hidden;
}

.bg-pattern {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 C25 5, 15 8, 15 18 C15 25, 25 32, 30 35 C35 32, 45 25, 45 18 C45 8, 35 5, 30 10Z' fill='%235C4033'/%3E%3C/svg%3E");
  background-size: 60px 60px;
}

/* ===== LOADING SCREEN ===== */
.loading-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg-green);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}
.loading-screen.hide { opacity: 0; pointer-events: none; }
.loading-leaf {
  width: 60px; height: 60px;
  animation: leafSpin 1.2s ease-in-out infinite;
}
.loading-leaf::before {
  content: '🍃'; font-size: 50px; display: block;
}
@keyframes leafSpin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.loading-text {
  margin-top: 16px; font-size: 16px; font-weight: 500;
  color: var(--leaf-dark); letter-spacing: 2px;
}

/* ===== MAIN LAYOUT ===== */
.app-wrapper {
  position: relative; z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 12px;
  min-height: 100vh;
}

.game-header {
  background: linear-gradient(135deg, var(--leaf) 0%, var(--leaf-dark) 100%);
  border-radius: 18px 18px 0 0;
  padding: 16px 20px;
  color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 8px var(--shadow);
  position: relative;
  overflow: hidden;
}
.game-header::after {
  content: ''; position: absolute; right: -20px; top: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.game-header h1 {
  font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px;
}
.header-actions { display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.35); }

.game-body {
  background: var(--cream);
  border-radius: 0 0 18px 18px;
  box-shadow: 0 8px 24px var(--shadow-md);
  overflow: hidden;
}

/* Desktop two-column layout */
.game-layout {
  display: grid;
  grid-template-columns: 1fr;
  min-height: 70vh;
}

@media (min-width: 768px) {
  .game-layout.has-sidebar {
    grid-template-columns: 260px 1fr;
  }
}

/* ===== SIDEBAR (PC) ===== */
.sidebar {
  background: var(--cream-dark);
  border-right: 3px solid var(--wood);
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 14px;
}

.sidebar-pet {
  text-align: center; padding: 16px 0;
}
.sidebar-pet-emoji {
  font-size: 72px; display: block;
  animation: petBounce 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
}
@keyframes petBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.sidebar-pet-name {
  font-size: 18px; font-weight: 700; margin-top: 4px; color: var(--brown);
}
.sidebar-pet-breed {
  font-size: 12px; color: var(--brown-light); margin-top: 2px;
}

.sidebar-section {
  background: var(--cream);
  border: 2px solid var(--wood);
  border-radius: 12px;
  padding: 12px;
}
.sidebar-section-title {
  font-size: 11px; font-weight: 700; color: var(--leaf-dark);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}

/* Stats in sidebar */
.stat-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.stat-row:last-child { margin-bottom: 0; }
.stat-icon { font-size: 16px; width: 24px; text-align: center; }
.stat-name { font-size: 12px; color: var(--brown-light); width: 32px; }
.stat-bar-wrap {
  flex: 1; height: 12px; background: rgba(0,0,0,0.06);
  border-radius: 6px; overflow: hidden; position: relative;
}
.stat-bar-fill {
  height: 100%; border-radius: 6px; transition: width 0.8s ease;
}
.stat-bar-fill.health { background: linear-gradient(90deg, #E07060, #F08070); }
.stat-bar-fill.mood { background: linear-gradient(90deg, #F0A050, #F5C060); }
.stat-bar-fill.energy { background: linear-gradient(90deg, #60A0D0, #80C0E0); }
.stat-val {
  font-size: 12px; font-weight: 700; width: 28px; text-align: right;
}

/* Level display in sidebar */
.level-display {
  text-align: center;
}
.level-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--brown); padding: 4px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  box-shadow: 0 2px 6px rgba(245, 197, 66, 0.3);
}
.level-progress-wrap {
  margin-top: 8px; height: 8px; background: rgba(0,0,0,0.06);
  border-radius: 4px; overflow: hidden;
}
.level-progress-fill {
  height: 100%; border-radius: 4px; transition: width 0.8s ease;
  background: linear-gradient(90deg, var(--gold), var(--gold-dark));
}
.level-next-info {
  font-size: 10px; color: var(--brown-light); margin-top: 4px;
}

/* Season display */
.season-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.season-spring { background: #E8F5E9; color: #2E7D32; }
.season-summer { background: #FFF3E0; color: #E65100; }
.season-autumn { background: #FBE9E7; color: #BF360C; }
.season-winter { background: #E3F2FD; color: #1565C0; }

/* Achievements in sidebar */
.achievements-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.achievement-slot {
  width: 100%; aspect-ratio: 1; border-radius: 8px;
  background: rgba(0,0,0,0.04); border: 2px dashed var(--wood);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.3s;
}
.achievement-slot.earned {
  background: linear-gradient(135deg, #FFF8E7, #FFECB3);
  border: 2px solid var(--gold);
  box-shadow: 0 1px 4px rgba(245, 197, 66, 0.3);
}
.achievement-slot.empty { opacity: 0.4; }

/* ===== SICK STATUS ===== */
.sick-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, #FFEBEE, #FFCDD2);
  color: #C62828; padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  animation: sickPulse 2s ease-in-out infinite;
  margin-top: 6px;
}
@keyframes sickPulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}
.sick-banner {
  background: linear-gradient(135deg, #FFEBEE, #FFCDD2);
  border: 2px solid #E57373;
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 12px;
  text-align: center;
  font-size: 14px;
  color: #C62828;
  font-weight: 600;
  animation: bannerSlide 0.6s ease-out;
}
.stat-bar-fill.health.sick-bar {
  background: linear-gradient(90deg, #C62828, #E57373) !important;
  animation: sickBarPulse 1.5s ease-in-out infinite;
}
@keyframes sickBarPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ===== AGING/FAREWELL ===== */
.aging-tag {
  background: linear-gradient(135deg, #E8E0D0, #D8D0C0);
  color: var(--brown); padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.farewell-emoji {
  font-size: 80px; display: block; margin: 10px 0;
  filter: grayscale(30%);
}

/* ===== MOBILE SIDEBAR (horizontal strip) ===== */
@media (max-width: 767px) {
  .sidebar {
    border-right: none;
    border-bottom: 3px solid var(--wood);
    padding: 14px;
    gap: 10px;
  }
  .sidebar-pet { padding: 8px 0; }
  .sidebar-pet-emoji { font-size: 56px; }
  .sidebar-stats-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .achievements-grid { grid-template-columns: repeat(5, 1fr); }
}

/* ===== MAIN CONTENT AREA ===== */
.main-content {
  padding: 20px;
  display: flex; flex-direction: column;
}

.content-area {
  animation: contentFadeIn 0.4s ease-out;
}
@keyframes contentFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scene header */
.scene-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.round-tag {
  background: var(--leaf); color: #fff;
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.scene-tag {
  background: var(--gold); color: var(--brown);
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}

.progress-dots {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--wood); transition: all 0.3s;
}
.dot.active { background: var(--leaf); transform: scale(1.2); }
.dot.done { background: var(--gold); }

/* Scene card */
.scene-card {
  background: #fff;
  border: 2px solid var(--wood);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  position: relative;
  line-height: 1.7;
  font-size: 15px;
}
.scene-card::before {
  content: '🍃';
  position: absolute; top: -8px; left: 14px;
  font-size: 16px;
}
.scene-card.event-card {
  border-color: var(--gold);
  background: #FFFDE7;
}
.scene-card.event-card::before { content: '⚡'; }

/* Choices */
.choices-list { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  padding: 14px 16px;
  background: #fff;
  border: 2px solid var(--wood);
  border-radius: 14px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  color: var(--brown);
  font-family: inherit;
  line-height: 1.5;
  position: relative;
  overflow: hidden;
}
.choice-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(123,182,97,0.05), rgba(245,197,66,0.05));
  opacity: 0; transition: opacity 0.25s;
}
.choice-btn:hover, .choice-btn:active {
  border-color: var(--leaf);
  transform: translateX(4px);
  box-shadow: 0 2px 8px var(--shadow);
}
.choice-btn:hover::after { opacity: 1; }

/* Response card */
.response-card {
  background: linear-gradient(135deg, #F0F8E8, #E8F5E0);
  border: 2px solid var(--leaf);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  line-height: 1.7;
  font-size: 15px;
}

/* Stat changes inline */
.stat-changes {
  display: flex; gap: 12px; justify-content: center;
  margin: 12px 0; flex-wrap: wrap;
}
.stat-change {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  animation: statPop 0.5s ease-out;
}
@keyframes statPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.stat-change.up { background: #E8F5E9; color: #2E7D32; }
.stat-change.down { background: #FFEBEE; color: #C62828; }
.stat-change.neutral { background: #F5F5F5; color: #757575; }

/* Level change notification */
.level-change-banner {
  text-align: center; padding: 14px; margin: 12px 0;
  border-radius: 14px; font-size: 16px; font-weight: 700;
  animation: bannerSlide 0.6s ease-out;
}
@keyframes bannerSlide {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.level-change-banner.up {
  background: linear-gradient(135deg, #FFF8E1, #FFECB3);
  color: var(--gold-dark); border: 2px solid var(--gold);
}
.level-change-banner.down {
  background: linear-gradient(135deg, #FFEBEE, #FFCDD2);
  color: var(--red); border: 2px solid var(--red);
}

/* Action button */
.action-btn {
  display: block; width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--leaf), var(--leaf-dark));
  color: #fff; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.25s;
  box-shadow: 0 3px 10px rgba(123,182,97,0.3);
  margin-top: 10px;
}
.action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(123,182,97,0.4); }
.action-btn.gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--brown);
  box-shadow: 0 3px 10px rgba(245,197,66,0.3);
}
.action-btn.gold:hover { box-shadow: 0 5px 15px rgba(245,197,66,0.4); }
.action-btn.secondary {
  background: #fff; color: var(--brown); border: 2px solid var(--wood);
  box-shadow: none;
}
.action-btn.secondary:hover { border-color: var(--leaf); }

/* ===== PET SELECT SCREEN ===== */
.welcome-title {
  text-align: center; margin-bottom: 20px;
}
.welcome-title h2 {
  font-size: 22px; font-weight: 900; color: var(--brown);
  margin-bottom: 4px;
}
.welcome-title p {
  font-size: 13px; color: var(--brown-light);
}

.pet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
@media (max-width: 500px) {
  .pet-grid { grid-template-columns: 1fr; }
}

.pet-card {
  background: #fff;
  border: 2px solid var(--wood);
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.pet-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(123,182,97,0.0), rgba(123,182,97,0.06));
  opacity: 0; transition: opacity 0.3s;
}
.pet-card:hover, .pet-card:active {
  border-color: var(--leaf);
  transform: translateY(-4px);
  box-shadow: 0 6px 16px var(--shadow);
}
.pet-card:hover::after { opacity: 1; }
.pet-card-emoji { font-size: 48px; margin-bottom: 8px; display: block; }
.pet-card-name { font-size: 16px; font-weight: 700; color: var(--brown); }
.pet-card-breed { font-size: 12px; color: var(--brown-light); margin: 2px 0; }
.pet-card-desc { font-size: 11px; color: var(--brown-light); opacity: 0.8; }

/* ===== ROUND RESULT SCREEN ===== */
.result-container { text-align: center; }
.result-emoji { font-size: 80px; display: block; margin: 10px 0; }
.result-title { font-size: 22px; font-weight: 900; margin: 8px 0; }

.rank-display {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 24px; border-radius: 30px;
  font-size: 28px; font-weight: 900; margin: 12px 0;
}
.rank-S { background: linear-gradient(135deg, #FFD700, #FFA000); color: #fff; box-shadow: 0 0 20px rgba(255,215,0,0.4); }
.rank-A { background: linear-gradient(135deg, #FF6B6B, #EE5A24); color: #fff; }
.rank-B { background: linear-gradient(135deg, #74b9ff, #0984e3); color: #fff; }
.rank-C { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
.rank-D { background: linear-gradient(135deg, #636e72, #b2bec3); color: #fff; }

.stars-display { font-size: 28px; margin: 8px 0; letter-spacing: 4px; }
.comment-box {
  background: #fff; border: 2px solid var(--wood); border-radius: 14px;
  padding: 14px; margin: 14px 0; font-size: 14px; line-height: 1.6;
  color: var(--brown);
}

/* ===== FINAL SUMMARY ===== */
.summary-stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 14px 0;
}
.summary-stat {
  background: #fff; border: 2px solid var(--wood); border-radius: 12px;
  padding: 12px; text-align: center;
}
.summary-stat-value { font-size: 24px; font-weight: 900; color: var(--leaf-dark); }
.summary-stat-label { font-size: 11px; color: var(--brown-light); margin-top: 2px; }

.personality-card {
  background: linear-gradient(135deg, #FFF8E7, #FFECB3);
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 16px;
  margin: 14px 0;
  text-align: center;
}
.personality-title { font-size: 11px; color: var(--gold-dark); font-weight: 700; letter-spacing: 1px; }
.personality-name { font-size: 20px; font-weight: 900; color: var(--brown); margin: 4px 0; }
.personality-desc { font-size: 13px; color: var(--brown-light); line-height: 1.5; }

/* ===== HIBERNATE ===== */
.hibernate-card {
  background: #FFFDE7; border: 2px solid var(--gold);
  border-radius: 14px; padding: 16px; margin: 12px 0;
  text-align: center; font-size: 14px; color: #8D6E00;
}

/* ===== ACHIEVEMENT POPUP ===== */
.achievement-popup {
  position: fixed; top: 20px; right: 20px; z-index: 500;
  background: linear-gradient(135deg, #FFF8E7, #FFECB3);
  border: 2px solid var(--gold);
  border-radius: 14px; padding: 14px 20px;
  box-shadow: 0 8px 24px rgba(245,197,66,0.3);
  display: flex; align-items: center; gap: 10px;
  animation: achieveSlide 0.5s ease-out, achieveFade 0.5s ease-in 2.5s forwards;
  max-width: 300px;
}
@keyframes achieveSlide {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes achieveFade {
  to { opacity: 0; transform: translateY(-20px); }
}
.achievement-popup-icon { font-size: 32px; }
.achievement-popup-text { font-size: 12px; color: var(--brown-light); }
.achievement-popup-name { font-size: 14px; font-weight: 700; color: var(--brown); }

/* ===== CONFETTI ===== */
.confetti-container {
  position: fixed; inset: 0; z-index: 400; pointer-events: none; overflow: hidden;
}
.confetti-piece {
  position: absolute; top: -20px;
  width: 10px; height: 10px;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== SEASON BACKGROUNDS ===== */
body.season-spring { background: #B8D8B0; }
body.season-summer { background: #C8D8A0; }
body.season-autumn { background: #D8C8A0; }
body.season-winter { background: #B8C8D8; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--wood); border-radius: 3px; }

/* Mobile adjustments */
@media (max-width: 767px) {
  .app-wrapper { padding: 0; }
  .game-header { border-radius: 0; }
  .game-body { border-radius: 0; }
  .main-content { padding: 14px; }
  .pet-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 400px) {
  .pet-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-leaf"></div>
  <div class="loading-text">Loading...</div>
</div>

<div class="app-wrapper">
  <div class="game-header">
    <h1>🏝️ Pet Island</h1>

// ===== GAME STATE =====
let state = {};
let usedSceneIdx = [];
let usedGenericIdx = [];
let currentScene = null;

function getDefaultState() {
  return {
    pet: null,
    health: 50, mood: 50, energy: 50,
    round: 0, sceneInRound: 0, scenesPerRound: 3,
    totalScenes: 0,
    roundStartTotal: 150,
    achievements: [],
    roundRatings: [],
    prevRoundRating: null,
    highestLevel: 0,
    hasLeveledUp: false,
    firstChoiceInRound: true,
    seasonsSeen: [],
    sick: false,
    sickTurns: 0,
    hasCuredSick: false,
    generation: 1,
    hasReproduced: false,
    offspringReady: false,
    petDisplayName: ''
  };
}

function init() {
  state = getDefaultState();
  usedSceneIdx = [];
  usedGenericIdx = [];
  currentScene = null;
}

// ===== LEVEL SYSTEM =====
function getPetLevel(total) {
  for (let i = PET_LEVELS.length - 1; i >= 0; i--) {
    if (total >= PET_LEVELS[i].min) return { ...PET_LEVELS[i], idx: i };
  }
  return { ...PET_LEVELS[0], idx: 0 };
}

function getNextPetLevel(total) {
  const cur = getPetLevel(total);
  return cur.idx < PET_LEVELS.length - 1 ? PET_LEVELS[cur.idx + 1] : null;
}

function getLevelProgress(total) {
  const cur = getPetLevel(total);
  const next = getNextPetLevel(total);
  if (!next) return 100;
  return Math.round((total - cur.min) / (next.min - cur.min) * 100);
}

// ===== SEASON SYSTEM =====
function getSeason(round) {
  return SEASONS[(Math.floor((round - 1) / 3)) % 4];
}

function applySeasonBonus() {
  const season = getSeason(state.round);
  if (season.bonus) {
    state[season.bonus] = Math.min(100, state[season.bonus] + 5);
  }
}

// ===== RATING SYSTEM =====
function getRoundRating(netChange) {
  if (netChange >= 20) return { grade: 'S', stars: 5, label: '完美！', color: 'rank-S' };
  if (netChange >= 10) return { grade: 'A', stars: 4, label: '优秀！', color: 'rank-A' };
  if (netChange >= 0) return { grade: 'B', stars: 3, label: '不错', color: 'rank-B' };
  if (netChange >= -10) return { grade: 'C', stars: 2, label: '还需努力', color: 'rank-C' };
  return { grade: 'D', stars: 1, label: '要加油哦', color: 'rank-D' };
}

function getStarsHTML(count) {
  let s = '';
  for (let i = 0; i < 5; i++) s += i < count ? '⭐' : '☆';
  return s;
}

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);
  const newAchievements = [];

  const checks = [
    ['first_steps', () => state.round >= 1 && state.sceneInRound >= state.scenesPerRound],
    ['best_friend', () => state.mood >= 90],
    ['health_nut', () => state.health >= 90],
    ['energizer', () => state.energy >= 90],
    ['balance', () => state.health >= 70 && state.mood >= 70 && state.energy >= 70],
    ['level_up', () => state.hasLeveledUp],
    ['comeback', () => state.prevRoundRating === 'D' && state.roundRatings.length > 0 && ['S','A'].includes(state.roundRatings[state.roundRatings.length-1])],
    ['whisperer', () => lv.idx >= 5],
    ['legend', () => lv.idx >= 9],
    ['seasons', () => state.seasonsSeen.length >= 4],
    ['healer', () => state.hasCuredSick],
    ['parent', () => state.hasReproduced],
    ['generation2', () => state.generation >= 2],
    ['perfect_round', () => state.roundRatings.includes('S')],
    ['collector', () => state.achievements.length >= 6]
  ];

  for (const [id, check] of checks) {
    if (!state.achievements.includes(id) && check()) {
      state.achievements.push(id);
      newAchievements.push(ACHIEVEMENTS.find(a => a.id === id));
    }
  }
  return newAchievements;
}

function showAchievementPopup(achievement) {
  const container = document.getElementById('achievementPopups');
  const popup = document.createElement('div');
  popup.className = 'achievement-popup';
  popup.innerHTML = `
    <div class="achievement-popup-icon">${achievement.emoji}</div>
    <div>
      <div class="achievement-popup-name">${achievement.name}</div>
      <div class="achievement-popup-text">${achievement.desc}</div>
    </div>
  `;
  container.appendChild(popup);
  setTimeout(() => popup.remove(), 3500);
}

// ===== CONFETTI =====
function showConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#F5C542', '#7BB661', '#89CFF0', '#F4A6B8', '#E07060', '#fff'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4000);
}

// ===== SCENE PICKER =====
function replaceNameInScene(scene, name) {
  const r = s => s.replace(/\{name\}/g, name);
  return {
    ...scene,
    text: r(scene.text),
    choices: scene.choices.map(c => ({
      ...c,
      text: r(c.text),
      response: r(c.response)
    }))
  };
}

function pickScene(petKey) {
  const pet = PETS[petKey];
  const petName = state.petDisplayName || pet.name;
  const pool = SCENES_POOL[petKey];

  // Random events check
  const eventChance = state.sick ? 0.55 : 0.35;
  if (state.totalScenes > 0 && state.sceneInRound === 1 && Math.random() < eventChance) {
    if (state.sick) {
      const medicalEvents = RANDOM_EVENTS.filter(e => e.choices.some(c => c.curesSick));
      const ev = medicalEvents[Math.floor(Math.random() * medicalEvents.length)];
      return { ...ev, fromPool: false };
    }
    const ev = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    return { ...ev, fromPool: false };
  }

  // Build available pet-specific scenes
  const availPet = [];
  for (let i = 0; i < pool.length; i++) {
    if (!usedSceneIdx.includes(i)) availPet.push(i);
  }

  // Build available generic scenes
  const availGeneric = [];
  for (let i = 0; i < GENERIC_SCENES.length; i++) {
    if (!usedGenericIdx.includes(i)) availGeneric.push(i);
  }

  // Reset pools if both exhausted
  if (availPet.length === 0 && availGeneric.length === 0) {
    usedSceneIdx = [];
    usedGenericIdx = [];
    for (let i = 0; i < pool.length; i++) availPet.push(i);
    for (let i = 0; i < GENERIC_SCENES.length; i++) availGeneric.push(i);
  }

  // Mix: 40% pet-specific (if available), 60% generic (if available)
  const usePetSpecific = availPet.length > 0 && (availGeneric.length === 0 || Math.random() < 0.4);

  if (usePetSpecific) {
    const pick = availPet[Math.floor(Math.random() * availPet.length)];
    usedSceneIdx.push(pick);
    return { ...pool[pick], fromPool: true };
  } else if (availGeneric.length > 0) {
    const pick = availGeneric[Math.floor(Math.random() * availGeneric.length)];
    usedGenericIdx.push(pick);
    return { ...replaceNameInScene(GENERIC_SCENES[pick], petName), fromPool: true };
  } else {
    const pick = Math.floor(Math.random() * pool.length);
    return { ...pool[pick], fromPool: true };
  }
}

// ===== PERSISTENCE =====
function saveGame() {
  try {
    localStorage.setItem('petIsland_state', JSON.stringify(state));
    localStorage.setItem('petIsland_usedScenes', JSON.stringify(usedSceneIdx));
    localStorage.setItem('petIsland_usedGeneric', JSON.stringify(usedGenericIdx));
  } catch(e) {}
}

function loadGame() {
  try {
    const s = localStorage.getItem('petIsland_state');
    const u = localStorage.getItem('petIsland_usedScenes');
    const g = localStorage.getItem('petIsland_usedGeneric');
    if (s) {
      const loaded = JSON.parse(s);
      state = { ...getDefaultState(), ...loaded };
      usedSceneIdx = u ? JSON.parse(u) : [];
      usedGenericIdx = g ? JSON.parse(g) : [];
      return true;
    }
  } catch(e) {}
  return false;
}

function clearSave() {
  localStorage.removeItem('petIsland_state');
  localStorage.removeItem('petIsland_usedScenes');
  localStorage.removeItem('petIsland_usedGeneric');
}

  }
}

function refreshSidebar() {
  const layout = document.getElementById('gameLayout');
  const sidebar = layout.querySelector('.sidebar');
  if (sidebar) {
    const newSidebar = document.createElement('div');
    newSidebar.innerHTML = buildSidebar();
    sidebar.replaceWith(newSidebar.firstElementChild);
  }
}

function updateSeasonBg() {
  const season = getSeason(state.round || 1);
  document.body.className = season.class.replace('season-', 'season-');
}

// ===== PET PERSONALITY =====
function getPersonality() {
  const { health, mood, energy } = state;
  const max = Math.max(health, mood, energy);
  if (health === max && mood === max) return { name: '幸福满满型', desc: '你的宠物既健康又快乐，是最幸福的小可爱！', emoji: '🌟' };
  if (health === max && energy === max) return { name: '活力健将型', desc: '健康又充满能量，随时准备好出发冒险！', emoji: '🏃' };
  if (mood === max && energy === max) return { name: '快乐精灵型', desc: '开心又有活力，是家里的小太阳！', emoji: '☀️' };
  if (health === max) return { name: '养生达人型', desc: '身体棒棒的，是最让人放心的宝贝。', emoji: '💚' };
  if (mood === max) return { name: '开心果型', desc: '永远笑嘻嘻的，看到它就心情好！', emoji: '😄' };
  if (energy === max) return { name: '精力旺盛型', desc: '永远电量满格，停不下来的小马达！', emoji: '🔋' };
  return { name: '均衡发展型', desc: '各方面都很平衡，是个懂事的好宝贝。', emoji: '⚖️' };
}

function selectPet(key) {
  state.pet = key;
  state.round = 1;
  state.sceneInRound = 0;
  state.petDisplayName = PETS[key].name;

  const season = getSeason(1);
  if (!state.seasonsSeen.includes(season.name)) state.seasonsSeen.push(season.name);

  updateLayout(true);
  updateSeasonBg();
  showRoundIntro();
}

function showRoundIntro() {
  const pet = PETS[state.pet];
  const petName = state.petDisplayName || pet.name;
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);
  const season = getSeason(state.round);

  if (!state.seasonsSeen.includes(season.name)) state.seasonsSeen.push(season.name);
  updateSeasonBg();

  state.roundStartTotal = total;
  state.firstChoiceInRound = true;

  // Stat decay after round 2
  if (state.round > 2) {
    const stats = ['health', 'mood', 'energy'];
    const decayStat = stats[Math.floor(Math.random() * 3)];
    state[decayStat] = Math.max(0, state[decayStat] - 3);
  }

  // Aging penalties after AGING_START
  let agingMsg = '';
  if (state.round >= AGING_START) {
    const agingPenalty = state.round >= 22 ? 5 : 3;
    state.health = Math.max(0, state.health - agingPenalty);
    state.energy = Math.max(0, state.energy - agingPenalty);
    const remainLife = MAX_LIFESPAN - state.round;
    if (remainLife <= 2) {
      agingMsg = `👴 ${petName}已经步入晚年了...它走得越来越慢，但眼神依然温柔。还剩 ${remainLife} 轮时光。`;
    } else {
      agingMsg = `🕐 ${petName}慢慢变老了，活动力开始下降...还能陪你 ${remainLife} 轮。`;
    }
  }

  // Sickness check — higher chance when health is low
  if (state.round > 1 && !state.sick) {
    const sickChance = 0.12 + (100 - state.health) / 400;
    if (Math.random() < sickChance) {
      state.sick = true;
      state.sickTurns = 0;
    }
  }

  applySeasonBonus();
  refreshSidebar();

  renderContent(`
    <div style="text-align:center;">
      <div style="font-size:64px;margin:10px 0;">${pet.emoji}</div>
      <div style="font-size:18px;font-weight:700;">${petName}</div>
      <div style="font-size:12px;color:var(--brown-light);">${pet.breed}${state.generation > 1 ? ` · 第${state.generation}代` : ''}</div>
    </div>

    <div class="scene-header" style="justify-content:center;margin-top:14px;">
      <span class="round-tag">第 ${state.round} 轮</span>
      <span class="season-badge ${season.class}">${season.emoji} ${season.name}</span>
      ${state.round >= AGING_START ? '<span class="round-tag" style="background:var(--brown-light);">👴 晚年</span>' : ''}
    </div>

    ${agingMsg ? `<div class="scene-card event-card" style="border-color:#B8A88A;background:#FFF8E7;">${agingMsg}</div>` : ''}

    <div class="scene-card">
      ${state.round === 1
        ? `欢迎来到宠物小岛！你选择了 <strong>${petName}</strong>（${pet.breed}）。<br><br>它现在是 ${lv.emoji} <strong>${lv.name}</strong>，好好照顾它，看它能成长到什么阶段吧！<br><br>每轮有 ${state.scenesPerRound} 个场景需要你做出选择。你的选择会影响宠物的健康、心情和体力～<br><br>🕐 每只宠物的寿命是2年（${MAX_LIFESPAN}轮），要珍惜在一起的每一天哦！`
        : `第 ${state.round} 轮养成开始！${petName}现在是 ${lv.emoji} <strong>${lv.name}</strong>。<br><br>${season.bonusText ? `${season.emoji} ${season.name}到了！本轮季节加成：<strong>${season.bonusText}</strong>` : `${season.emoji} ${season.name}来了，继续照顾${petName}吧！`}${state.round > 2 && state.round < AGING_START ? '<br><br>⏳ 随着时间流逝，属性有所波动...' : ''}`}
    </div>

    ${state.sick ? `<div class="sick-banner">🤒 ${pet.name}生病了！健康和心情会持续下降，赶紧想办法治疗吧！</div>` : ''}

    <button class="action-btn" onclick="nextSceneInRound()">🎮 开始养成！</button>
    ${state.sick ? `<button class="action-btn secondary" onclick="visitVet()" style="margin-top:8px;">🏥 直接带${pet.name}去看兽医</button>` : ''}
  `);

  saveGame();
}

function nextSceneInRound() {
  state.sceneInRound++;
  if (state.sceneInRound > state.scenesPerRound) {
    showRoundResult();
    return;
  }
  currentScene = pickScene(state.pet);
  showSceneUI();
}

function showSceneUI() {
  const pet = PETS[state.pet];
  const scene = currentScene;

  let dots = '<div class="progress-dots">';
  for (let i = 1; i <= state.scenesPerRound; i++) {
    dots += `<div class="dot ${i < state.sceneInRound ? 'done' : ''} ${i === state.sceneInRound ? 'active' : ''}"></div>`;
  }
  dots += '</div>';

  const choicesHTML = scene.choices.map((c, i) =>
    `<button class="choice-btn" onclick="choose(${i})">${c.text}</button>`
  ).join('');

  renderContent(`
    <div class="scene-header">
      <span class="round-tag">第 ${state.round} 轮</span>
      <span class="scene-tag">第 ${state.sceneInRound}/${state.scenesPerRound} 幕</span>
    </div>
    ${dots}
    ${state.sick ? `<div class="sick-banner">🤒 ${pet.name}正在生病，每幕会额外扣血扣心情！${state.sickTurns >= 2 ? '病情在恶化...' : ''}</div>` : ''}
    <div class="scene-card ${scene.isEvent ? 'event-card' : ''}">${scene.text}</div>
    <div class="choices-list">${choicesHTML}</div>
  `);
}

function choose(idx) {
  const choice = currentScene.choices[idx];
  const prevTotal = state.health + state.mood + state.energy;
  const prevLv = getPetLevel(prevTotal);

  // Apply daily bonus for first choice
  if (state.firstChoiceInRound) {
    state.health = Math.min(100, state.health + 3);
    state.mood = Math.min(100, state.mood + 3);
    state.energy = Math.min(100, state.energy + 3);
    state.firstChoiceInRound = false;
  }

  // Sick penalties — each scene drains stats, worsens over time
  let sickDrain = null;
  if (state.sick) {
    state.sickTurns++;
    const hDrain = state.sickTurns >= 4 ? -8 : -5;
    const mDrain = state.sickTurns >= 4 ? -5 : -3;
    const eDrain = state.sickTurns >= 3 ? -3 : 0;
    state.health = Math.max(0, state.health + hDrain);
    state.mood = Math.max(0, state.mood + mDrain);
    state.energy = Math.max(0, state.energy + eDrain);
    sickDrain = { health: hDrain, mood: mDrain, energy: eDrain };
  }

  // Cure or worsen sickness based on choice flags
  if (choice.curesSick && state.sick) {
    state.sick = false;
    state.sickTurns = 0;
    state.hasCuredSick = true;
  } else if (choice.makesSick && !state.sick) {
    state.sick = true;
    state.sickTurns = 0;
  }

  state.health = Math.max(0, Math.min(100, state.health + choice.effects.health));
  state.mood = Math.max(0, Math.min(100, state.mood + choice.effects.mood));
  state.energy = Math.max(0, Math.min(100, state.energy + choice.effects.energy));
  state.totalScenes++;

  const newTotal = state.health + state.mood + state.energy;
  const newLv = getPetLevel(newTotal);

  if (newLv.idx > state.highestLevel) state.highestLevel = newLv.idx;

  let levelChange = null;
  if (newLv.idx > prevLv.idx) {
    levelChange = 'up';
    state.hasLeveledUp = true;
    showConfetti();
  } else if (newLv.idx < prevLv.idx) {
    levelChange = 'down';
  }

  const newAchievements = checkAchievements();
  for (const a of newAchievements) {
    setTimeout(() => showAchievementPopup(a), 500);
  }

  refreshSidebar();

  if (choice.checkHibernate && state.energy <= 0) {
    showHibernate(choice.response, choice.effects, levelChange);
    return;
  }

  showChoiceResult(choice.response, choice.effects, levelChange, sickDrain, choice.curesSick);
  saveGame();
}

function statChangeHTML(effects) {
  const items = [
    { label: '❤️', val: effects.health },
    { label: '😊', val: effects.mood },
    { label: '⚡', val: effects.energy }
  ];
  return `<div class="stat-changes">
    ${items.map(s => {
      if (s.val === 0) return '';
      const cls = s.val > 0 ? 'up' : 'down';
      return `<span class="stat-change ${cls}">${s.label} ${s.val > 0 ? '+' : ''}${s.val}</span>`;
    }).join('')}
  </div>`;
}

function showChoiceResult(response, effects, levelChange, sickDrain, cured) {
  const pet = PETS[state.pet];
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);

  let levelBanner = '';
  if (levelChange === 'up') {
    levelBanner = `<div class="level-change-banner up">⬆️ ${pet.name}晋级为 ${lv.emoji} ${lv.name}！</div>`;
  } else if (levelChange === 'down') {
    levelBanner = `<div class="level-change-banner down">⬇️ ${pet.name}降级为 ${lv.emoji} ${lv.name}...</div>`;
  }

  let sickInfo = '';
  if (sickDrain && !cured) {
    sickInfo = `<div class="sick-banner">🤒 生病中！本幕额外损失：❤️${sickDrain.health} 😊${sickDrain.mood}${sickDrain.energy ? ' ⚡' + sickDrain.energy : ''}${state.sickTurns >= 3 ? '<br>⚠️ 病情在恶化，赶紧治疗！' : ''}</div>`;
  } else if (cured) {
    sickInfo = `<div class="level-change-banner up">🎉 ${pet.name}的病治好了！恢复健康！</div>`;
  }

  renderContent(`
    ${levelBanner}
    ${sickInfo}
    <div class="response-card">${response}</div>
    ${statChangeHTML(effects)}
    <button class="action-btn" onclick="nextSceneInRound()">
      ${state.sceneInRound >= state.scenesPerRound ? '📊 查看本轮结果' : '👉 下一幕'}
    </button>
  `);
}

function showHibernate(response, effects, levelChange) {
  const pet = PETS[state.pet];

  renderContent(`
    <div style="text-align:center;font-size:64px;margin:10px 0;">😴💤</div>
    <div class="response-card">${response}</div>
    <div class="hibernate-card">
      ⚠️ <strong>${pet.name}进入了休眠状态！</strong><br>体力消耗过大，需要好好休息...
    </div>
    ${statChangeHTML(effects)}
    <button class="action-btn" onclick="showRoundResult()">📊 查看本轮结果</button>
  `);
  saveGame();
}

function visitVet() {
  const pet = PETS[state.pet];
  const prevTotal = state.health + state.mood + state.energy;
  const prevLv = getPetLevel(prevTotal);

  state.sick = false;
  state.sickTurns = 0;
  state.hasCuredSick = true;
  state.health = Math.min(100, state.health + 10);
  state.mood = Math.max(0, state.mood - 5);
  state.energy = Math.max(0, state.energy - 10);

  const newTotal = state.health + state.mood + state.energy;
  const newLv = getPetLevel(newTotal);

  refreshSidebar();
  saveGame();

  const effects = { health: 10, mood: -5, energy: -10 };

  renderContent(`
    <div class="level-change-banner up">🎉 ${pet.name}的病治好了！</div>
    <div class="response-card">你带${pet.name}去了宠物医院，医生仔细检查后开了药。${pet.name}虽然打针的时候有点紧张，但在你的安慰下勇敢地扛过去了！回家后${pet.name}精神好多了～</div>
    ${statChangeHTML(effects)}
    <button class="action-btn" onclick="nextSceneInRound()">🎮 开始养成！</button>
  `);
}

function showRoundResult() {
  const pet = PETS[state.pet];
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);
  const netChange = total - state.roundStartTotal;
  const rating = getRoundRating(netChange);

  state.roundRatings.push(rating.grade);
  state.prevRoundRating = rating.grade;

  const newAchievements = checkAchievements();
  for (const a of newAchievements) {
    setTimeout(() => showAchievementPopup(a), 500);
  }

  refreshSidebar();

  const petName = state.petDisplayName || pet.name;

  let comment;
  if (lv.idx >= 9) comment = `${petName}已经成为传说岛民了！你们之间的默契无人能及！`;
  else if (lv.idx >= 7) comment = `${petName}已经是岛上的VIP了！继续加油！`;
  else if (lv.idx >= 5) comment = `${petName}正在茁壮成长，你是一位出色的岛民！`;
  else if (lv.idx >= 3) comment = `${petName}已经融入小岛生活了，继续努力！`;
  else if (lv.idx >= 1) comment = `${petName}正在适应新家，多花时间陪伴它！`;
  else comment = `${petName}还是新来的岛民，需要更多关爱哦！`;

  const remainLife = MAX_LIFESPAN - state.round;
  if (remainLife <= 4 && remainLife > 0) {
    comment += `<br><br>🕐 ${petName}还能陪你 ${remainLife} 轮...珍惜每一刻吧。`;
  }

  let btns = '';
  if (state.round < MAX_LIFESPAN) {
    btns += `<button class="action-btn gold" onclick="nextRound()">🔄 继续下一轮</button>`;
  } else {
    btns += `<button class="action-btn gold" onclick="showPetFarewell()">🌅 送别${petName}...</button>`;
  }
  btns += `<button class="action-btn secondary" onclick="showFinalSummary()" style="margin-top:8px;">📋 查看总结报告</button>`;
  btns += `<button class="action-btn secondary" onclick="showPetSelect()" style="margin-top:8px;">🐾 换个宠物重新开始</button>`;

  renderContent(`
    <div class="result-container">
      <div class="result-emoji">${pet.emoji}</div>
      <div class="result-title">第 ${state.round} 轮结束</div>

      <div class="rank-display ${rating.color}">${rating.grade}</div>
      <div class="stars-display">${getStarsHTML(rating.stars)}</div>
      <div style="font-size:14px;color:var(--brown-light);margin-bottom:12px;">${rating.label}</div>

      <div style="margin:8px 0;">
        <span style="font-size:13px;color:var(--brown-light);">本轮变化：</span>
        <span style="font-size:18px;font-weight:700;color:${netChange >= 0 ? 'var(--leaf-dark)' : 'var(--red)'};">${netChange >= 0 ? '+' : ''}${netChange}</span>
        <span style="font-size:13px;color:var(--brown-light);">  总分：</span>
        <span style="font-size:18px;font-weight:700;color:var(--leaf-dark);">${total}/300</span>
      </div>

      <div class="comment-box">${comment}</div>

      ${btns}
    </div>
  `);

  saveGame();
}

function showFinalSummary() {
  const pet = PETS[state.pet];
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);
  const highestLv = PET_LEVELS[state.highestLevel];
  const personality = getPersonality();

  const avgGrade = state.roundRatings.length > 0
    ? (() => {
        const vals = { S: 5, A: 4, B: 3, C: 2, D: 1 };
        const avg = state.roundRatings.reduce((s, g) => s + vals[g], 0) / state.roundRatings.length;
        if (avg >= 4.5) return 'S';
        if (avg >= 3.5) return 'A';
        if (avg >= 2.5) return 'B';
        if (avg >= 1.5) return 'C';
        return 'D';
      })()
    : 'B';

  const ratingSummary = getRoundRating(avgGrade === 'S' ? 20 : avgGrade === 'A' ? 10 : avgGrade === 'B' ? 0 : avgGrade === 'C' ? -5 : -15);

  renderContent(`
    <div class="result-container">
      <div class="result-emoji">${pet.emoji}</div>
      <div class="result-title">${pet.name}的成长报告</div>

      <div class="personality-card">
        <div class="personality-title">🧬 宠物性格</div>
        <div class="personality-name">${personality.emoji} ${personality.name}</div>
        <div class="personality-desc">${personality.desc}</div>
      </div>

      <div class="summary-stats">
        <div class="summary-stat">
          <div class="summary-stat-value">${state.round}</div>
          <div class="summary-stat-label">总轮数</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${total}/300</div>
          <div class="summary-stat-label">总分</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${highestLv.emoji}</div>
          <div class="summary-stat-label">最高等级：${highestLv.name}</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${state.achievements.length}/${ACHIEVEMENTS.length}</div>
          <div class="summary-stat-label">成就</div>
        </div>
      </div>

      <div style="margin:12px 0;">
        <div style="font-size:12px;color:var(--brown-light);margin-bottom:4px;">综合评价</div>
        <div class="rank-display ${ratingSummary.color}">${avgGrade}</div>
        <div class="stars-display">${getStarsHTML(ratingSummary.stars)}</div>
      </div>

      <div style="margin:12px 0;font-size:12px;color:var(--brown-light);">
        各轮评价：${state.roundRatings.map(r => `<strong>${r}</strong>`).join(' → ')}
      </div>

      ${state.achievements.length > 0 ? `
        <div class="comment-box" style="text-align:left;">
          <strong>获得的成就：</strong><br>
          ${state.achievements.map(id => {
            const a = ACHIEVEMENTS.find(x => x.id === id);
            return `${a.emoji} ${a.name}`;
          }).join(' · ')}
        </div>
      ` : ''}

      <button class="action-btn" onclick="showRoundResult()">↩️ 返回</button>
      <button class="action-btn secondary" onclick="showPetSelect()" style="margin-top:8px;">🐾 重新开始</button>

      <div style="margin-top:16px;font-size:10px;color:var(--brown-light);">
        游戏设计：小小设计师 👧 | 技术实现：AI 🤖
      </div>
    </div>
  `);
}

// ===== REPRODUCTION =====
function showReproduction() {
  const pet = PETS[state.pet];
  const petName = state.petDisplayName || pet.name;

  updateLayout(true);
  refreshSidebar();
  showConfetti();

  renderContent(`
    <div style="text-align:center;">
      <div style="font-size:64px;margin:10px 0;">${pet.babyEmoji}${pet.emoji}${pet.babyEmoji}</div>
      <div class="result-title">🎉 新生命诞生！</div>
    </div>

    <div class="scene-card event-card">
      太棒了！<strong>${petName}</strong>${pet.birthVerb}！<br><br>
      小小的${pet.babyWord}依偎在${petName}身边，${petName}温柔地看着自己的孩子，眼里满满的都是爱。<br><br>
      ${petName}的生命不会永远持续，但有了后代，它的血脉将会延续下去。当${petName}走完这一生时，你可以继续照顾它的孩子～
    </div>

    ${statChangeHTML({health:5, mood:15, energy:-5})}

    <button class="action-btn gold" onclick="confirmReproduction()">💕 欢迎小宝贝的到来！</button>
  `);
}

function confirmReproduction() {
  state.hasReproduced = true;
  state.offspringReady = true;
  state.health = Math.min(100, state.health + 5);
  state.mood = Math.min(100, state.mood + 15);
  state.energy = Math.max(0, state.energy - 5);

  const newAchievements = checkAchievements();
  for (const a of newAchievements) {
    setTimeout(() => showAchievementPopup(a), 500);
  }

  refreshSidebar();
  saveGame();
  showRoundIntro();
}

// ===== PET FAREWELL (death) =====
function showPetFarewell() {
  const pet = PETS[state.pet];
  const petName = state.petDisplayName || pet.name;
  const total = state.health + state.mood + state.energy;
  const lv = getPetLevel(total);
  const highestLv = PET_LEVELS[state.highestLevel];
  const personality = getPersonality();

  updateLayout(true);
  refreshSidebar();

  const genSuffix = ['', '二世', '三世', '四世', '五世', '六世', '七世', '八世', '九世', '十世'];
  const nextGenName = pet.name + (genSuffix[state.generation] || `${state.generation+1}世`);

  renderContent(`
    <div class="result-container">
      <div style="font-size:64px;margin:10px 0;">🌅${pet.emoji}💫</div>
      <div class="result-title">告别 ${petName}</div>

      <div class="scene-card" style="text-align:left;line-height:1.8;">
        ${petName}走完了它快乐的一生。<br><br>
        在这 ${state.round - 1} 轮的时光里，${petName}从一个${PET_LEVELS[0].name}成长为 ${lv.emoji} <strong>${lv.name}</strong>。
        它最高达到了 ${highestLv.emoji} <strong>${highestLv.name}</strong> 的等级。<br><br>
        ${petName}的性格是 ${personality.emoji} <strong>${personality.name}</strong> — ${personality.desc}<br><br>
        ${state.offspringReady
          ? `虽然${petName}离开了，但它的孩子 <strong>${nextGenName}</strong> 已经准备好继续这段旅程了！🌱`
          : `${petName}安静地闭上了眼睛，带着满满的回忆离开了...谢谢你陪伴它的每一天。`}
      </div>

      <div class="summary-stats">
        <div class="summary-stat">
          <div class="summary-stat-value">${state.round - 1}</div>
          <div class="summary-stat-label">陪伴轮数</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${highestLv.emoji}</div>
          <div class="summary-stat-label">最高等级</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${state.generation}</div>
          <div class="summary-stat-label">第几代</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-value">${state.achievements.length}</div>
          <div class="summary-stat-label">成就数</div>
        </div>
      </div>

      ${state.offspringReady
        ? `<button class="action-btn gold" onclick="startNewGeneration()">🌱 开始养育 ${nextGenName}</button>`
        : `<button class="action-btn" onclick="showPetSelect()">🐾 选择新的宠物</button>`}
      <button class="action-btn secondary" onclick="showPetSelect()" style="margin-top:8px;">🔄 换一种宠物重新开始</button>
    </div>
  `);

  saveGame();
}

// ===== NEW GENERATION =====
function startNewGeneration() {
  const pet = PETS[state.pet];
  const prevGen = state.generation;
  const prevHealth = state.health;
  const prevMood = state.mood;
  const prevEnergy = state.energy;
  const prevAchievements = [...state.achievements];
  const prevRoundRatings = [...state.roundRatings];
  const petKey = state.pet;

  const genSuffix = ['', '二世', '三世', '四世', '五世', '六世', '七世', '八世', '九世', '十世'];
  const newGenName = pet.name + (genSuffix[prevGen] || `${prevGen+1}世`);

  // Reset state for new generation
  state.round = 1;
  state.sceneInRound = 0;
  state.scenesPerRound = 3;
  state.totalScenes = 0;
  state.roundStartTotal = 150;
  state.roundRatings = [];
  state.prevRoundRating = null;
  state.highestLevel = 0;
  state.hasLeveledUp = false;
  state.firstChoiceInRound = true;
  state.seasonsSeen = [];
  state.sick = false;
  state.sickTurns = 0;
  state.hasReproduced = false;
  state.offspringReady = false;

  // Inherit from parent
  state.generation = prevGen + 1;
  state.petDisplayName = newGenName;
  state.health = Math.min(100, 50 + Math.round(prevHealth * 0.15));
  state.mood = Math.min(100, 50 + Math.round(prevMood * 0.15));
  state.energy = Math.min(100, 50 + Math.round(prevEnergy * 0.15));
  state.achievements = prevAchievements;
  state.hasCuredSick = prevAchievements.includes('healer');

  usedSceneIdx = [];
  usedGenericIdx = [];
  currentScene = null;

  const season = getSeason(1);
  if (!state.seasonsSeen.includes(season.name)) state.seasonsSeen.push(season.name);

  const newAchievements = checkAchievements();
  for (const a of newAchievements) {
    setTimeout(() => showAchievementPopup(a), 500);
  }

  updateLayout(true);
  updateSeasonBg();
  showConfetti();

  renderContent(`
    <div style="text-align:center;">
      <div style="font-size:64px;margin:10px 0;">${pet.babyEmoji}✨</div>
      <div class="result-title">🌱 ${newGenName}来了！</div>
    </div>

    <div class="scene-card">
      <strong>${newGenName}</strong>继承了上一代的优秀基因，开始了新的冒险！<br><br>
      第${state.generation}代 ${pet.breed} 已经准备好了。它带着上一代的祝福，要创造属于自己的故事。<br><br>
      初始属性受到了上一代的加成：<br>
      ❤️ 健康 ${state.health} · 😊 心情 ${state.mood} · ⚡ 体力 ${state.energy}
    </div>

    <button class="action-btn gold" onclick="showRoundIntro()">🎮 开始第${state.generation}代的旅程！</button>
  `);

  saveGame();
}

function nextRound() {
  state.round++;
  state.sceneInRound = 0;
  if (state.round >= 4) state.scenesPerRound = 4;

  // Check lifespan — pet dies after MAX_LIFESPAN rounds
  if (state.round > MAX_LIFESPAN) {
    showPetFarewell();
    return;
  }

  // Check reproduction trigger
  if (!state.hasReproduced && state.round >= REPRODUCE_MIN && state.round <= REPRODUCE_MAX) {
    const reproChance = state.round >= REPRODUCE_MAX ? 1.0 : 0.5;
    if (Math.random() < reproChance) {
      showReproduction();
      return;
    }
  }
  // Force reproduction before it's too late
  if (!state.hasReproduced && state.round > REPRODUCE_MAX) {
    showReproduction();
    return;
  }

  showRoundIntro();
}

// ===== HEADER ACTIONS =====
function confirmRestart() {
  if (state.pet && confirm('确定要重新开始吗？当前进度将丢失。')) {
    showPetSelect();
  } else if (!state.pet) {
    showPetSelect();
  }
}

function toggleAchievements() {
  if (!state.pet) return;
  let html = '<div style="text-align:center;"><div class="result-title">🎖️ 成就一览</div></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0;">';
  for (const a of ACHIEVEMENTS) {
    const earned = state.achievements.includes(a.id);
    html += `
      <div style="background:${earned ? 'linear-gradient(135deg,#FFF8E7,#FFECB3)' : '#f5f5f5'};border:2px solid ${earned ? 'var(--gold)' : 'var(--wood)'};border-radius:12px;padding:12px;text-align:center;${earned ? '' : 'opacity:0.5;'}">
        <div style="font-size:28px;">${a.emoji}</div>
        <div style="font-size:13px;font-weight:700;margin:4px 0;">${a.name}</div>
        <div style="font-size:11px;color:var(--brown-light);">${a.desc}</div>
        ${earned ? '<div style="font-size:10px;color:var(--gold-dark);margin-top:4px;">✓ 已获得</div>' : ''}
      </div>`;
  }
  html += '</div>';
  html += '<button class="action-btn secondary" onclick="restoreView()">↩️ 返回</button>';
  renderContent(html);
}

let savedView = null;
function restoreView() {
  if (state.pet && state.round > 0) {
    if (state.sceneInRound === 0) showRoundIntro();
    else if (state.sceneInRound > state.scenesPerRound) showRoundResult();
    else if (currentScene) showSceneUI();
    else showRoundIntro();
  } else {
    showPetSelect();
  }
}

// ===== INIT =====
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hide');
  }, 800);

  if (loadGame() && state.pet) {
    updateLayout(true);
    updateSeasonBg();
    if (state.sceneInRound === 0) {
      showRoundIntro();
    } else {
      showRoundIntro();
    }
  } else {
    showPetSelect();
  }
});
</script>
</body>
</html>
